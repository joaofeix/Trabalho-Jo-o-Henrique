<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente de Planejamento Jornalístico</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; color: #212529; padding: 20px; line-height: 1.6; }
        .container { max-width: 700px; margin: auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #0056b3; text-align: center; font-size: 26px; margin-bottom: 25px; border-bottom: 2px solid #e9ecef; padding-bottom: 15px; }
        label { font-weight: 600; display: block; margin-top: 20px; color: #495057; }
        select, input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: 1px solid #ced4da; font-size: 16px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 25px; transition: background 0.2s; }
        button:hover { background-color: #0056b3; }
        .result-box { margin-top: 30px; padding: 20px; background: #f1f3f5; border-left: 6px solid #007bff; border-radius: 4px; display: none; }
        h3 { margin-top: 0; color: #0056b3; font-size: 20px; }
        .section-title { font-weight: bold; color: #343a40; margin-top: 15px; text-decoration: underline; }
        ul { padding-left: 20px; margin-top: 10px; }
        li { margin-bottom: 8px; }
        .footer { text-align: center; margin-top: 40px; font-size: 12px; color: #adb5bd; border-top: 1px solid #e9ecef; padding-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Assistente de Pauta Jornalística</h1>
    
    <label for="tipoEvento">Selecione o Tipo de Cobertura:</label>
    <select id="tipoEvento">
        <option value="esporte">⚽ Cobertura Esportiva Geral</option>
        <option value="coletiva">🎤 Coletiva de Imprensa</option>
        <option value="geral">🏙️ Evento Comunitário / Geral</option>
        <option value="investigativa">🔍 Reportagem Investigativa</option>
    </select>

    <label for="titulo">Assunto da Matéria:</label>
    <input type="text" id="titulo" placeholder="Ex: Impacto das Obras no Centro">

    <button onclick="gerarPauta()">Gerar Roteiro de Apoio</button>

    <div id="resultado" class="result-box">
        <h3 id="res-titulo"></h3>
        
        <div class="section-title">📍 Perguntas para o Lide:</div>
        <ul id="lista-perguntas"></ul>
        
        <div class="section-title">🎒 Checklist de Campo:</div>
        <ul id="lista-equipamentos"></ul>
    </div>

    <div class="footer">
        Atividade Experiência IA - Curso de Jornalismo
    </div>
</div>

<script>
    const bancoDados = {
        esporte: {
            perguntas: [
                "Como a preparação física influenciou no resultado final?",
                "Quais foram os principais erros táticos observados?",
                "Qual a importância deste resultado para a sequência da competição?",
                "Houve algum destaque individual que mudou o rumo do evento?",
                "Qual a análise sobre as condições climáticas e do local de prova?",
                "Como a equipe pretende ajustar a estratégia para o próximo desafio?"
            ],
            equipamentos: ["Cronômetro", "Gravador de voz", "Tripé flexível", "Bloco de anotações rápido"]
        },
        coletiva: {
            perguntas: [
                "Quais são os dados concretos que sustentam esse anúncio?",
                "Haverá algum impacto direto no orçamento público?",
                "Qual o cronograma detalhado das próximas etapas?",
                "Quem serão os responsáveis diretos pela execução deste projeto?",
                "Como as críticas anteriores foram consideradas nesta nova decisão?",
                "Existe algum plano de transparência para o acompanhamento dos dados?"
            ],
            equipamentos: ["Microfone", "Capa de chuva (se externo)", "Lista de contatos da assessoria", "Cartão de visita"]
        },
        geral: {
            perguntas: [
                "Qual o objetivo principal desta iniciativa para a comunidade?",
                "Como os moradores locais estão sendo afetados?",
                "Existe alguma história individual que personifica esse evento?",
                "Qual o balanço geral de público e participação?",
                "Houve algum suporte ou parceria de entidades externas?",
                "Quais as próximas datas importantes relacionadas a este fato?"
            ],
            equipamentos: ["Câmera fotográfica", "Carregador portátil", "Documento de identificação", "Canetas reservas"]
        },
        investigativa: {
            perguntas: [
                "O que os documentos oficiais revelam sobre as contradições encontradas?",
                "Quais são as fontes que confirmam o histórico dos envolvidos?",
                "Existem evidências de benefícios irregulares para grupos específicos?",
                "Como os dados obtidos divergem das declarações públicas oficiais?",
                "Há um padrão de irregularidade identificado em períodos anteriores?",
                "Quais são os riscos identificados para o interesse público nesta situação?"
            ],
            equipamentos: ["Cópia de documentos físicos", "Gravador de segurança", "App de digitalização de documentos", "Bateria extra"]
        }
    };

    function sortear(array, quantidade) {
        return array.sort(() => 0.5 - Math.random()).slice(0, quantidade);
    }

    function gerarPauta() {
        const tipo = document.getElementById('tipoEvento').value;
        const titulo = document.getElementById('titulo').value || "Pauta Geral";
        const resultadoDiv = document.getElementById('resultado');
        
        const dados = bancoDados[tipo];
        
        document.getElementById('res-titulo').innerText = "Plano: " + titulo;
        
        const perguntasSorteadas = sortear(dados.perguntas, 4);
        document.getElementById('lista-perguntas').innerHTML = perguntasSorteadas.map(p => `<li>${p}</li>`).join('');
        
        const equipSorteados = sortear(dados.equipamentos, 3);
        const fixos = ["Celular", "Internet móvel"];
        document.getElementById('lista-equipamentos').innerHTML = [...fixos, ...equipSorteados].map(e => `<li>${e}</li>`).join('');
        
        resultadoDiv.style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
